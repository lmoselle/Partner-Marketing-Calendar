  { end: "2026-01-31", label: "1/31",  range: "1/25\u201331" },
  { end: "2026-02-07", label: "2/7",   range: "2/1\u20137" },
  { end: "2026-02-14", label: "2/14",  range: "2/8\u201314" },
  { end: "2026-02-21", label: "2/21",  range: "2/15\u201321" },
  { end: "2026-02-28", label: "2/28",  range: "2/22\u201328" },
  { end: "2026-03-07", label: "3/7",   range: "3/1\u20137" },
  { end: "2026-03-14", label: "3/14",  range: "3/8\u201314" },

const KEY_DATE_BADGES = { "2026-01-17": "IRS Opens", "2026-01-24": "HCAP Lock", "2026-04-04": "HCAP Lite", "2026-04-18": "Tax Deadline" };
const OWNERS = ["All", "Charlie Snyder", "Erin Smith", "John Meaney", "Laura Thompson", "Nile Norwood", "Rachel"];
const OWNER_COLORS = { "Charlie Snyder": "#534AB7", "Erin Smith": "#0F6E56", "John Meaney": "#993C1D", "Laura Thompson": "#185FA5", "Nile Norwood": "#993556", "Rachel": "#854F0B" };
const STATUS_COLORS = {
  Planned:           { bg: "#FEF3C7", border: "#F59E0B", text: "#92400E" },
  Tentative:         { bg: "#FFFBEB", border: "#FCD34D", text: "#92400E" },
  Live:              { bg: "#DBEAFE", border: "#3B82F6", text: "#1E40AF" },
  Completed:         { bg: "#D1FAE5", border: "#10B981", text: "#065F46" },
  "Needs results":   { bg: "#FEE2E2", border: "#EF4444", text: "#991B1B" },
  "Not participating":{ bg: "#F3F4F6", border: "#9CA3AF", text: "#4B5563" },
};
const ACTIVITY_TYPES = ["Email drop","Website/banner","In-app placement","Push/SMS","Social","Webinar","Print","Newsletter","Other"];
const STATUSES = ["Planned","Tentative","Live","Completed","Needs results","Not participating"];

const LS_AM  = "tt25-ams-v1";
const LS_P   = "tt25-partners-v1";
const LS_A   = "tt25-activities-v1";
const LS_GTM = "tt25-gtm-v1";
function loadLS(key, fallback) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; } }
function saveLS(key, val)       { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }

const fmt = n => n >= 1e6 ? (n/1e6).toFixed(1)+"M" : n >= 1e3 ? (n/1e3).toFixed(0)+"k" : n ? String(n) : "\u2014";
const LS = { display:"block",fontWeight:600,fontSize:11,color:"#64748B",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.04em" };
const IS = { width:"100%",padding:"8px 10px",borderRadius:8,border:"1px solid #E2E8F0",fontSize:13,outline:"none",boxSizing:"border-box",fontFamily:"inherit",background:"#fff" };

// ---- APP ----
function App() {
  const [tab, setTab]           = useState("calendar");
  const [ownerFilter, setOwner] = useState("All");
  const [ams, setAMs] = useState(() => loadLS(LS_AM, ["Charlie Snyder","Erin Smith","John Meaney","Laura Thompson","Nile Norwood","Rachel"]));
  const [amModal, setAMModal] = useState(false);
  const [partners, setPartners] = useState(() => loadLS(LS_P, SEED_PARTNERS));
  const [activities, setActs]   = useState(() => loadLS(LS_A, SEED_ACTIVITIES));
  const [partnerModal, setPartnerModal] = useState(null); // null | "add" | {partner object}
  const [gtmData, setGtm]       = useState(() => loadLS(LS_GTM, {}));
  const [modal, setModal]       = useState(null);
  const [addModal, setAdd]       = useState(false);
  const calRef = useRef(null);

  const updateAct = useCallback((id, field, val) => {
    setActs(prev => {
      const next = prev.map(a => {
        if (a.id !== id) return a;
        const u = { ...a, [field]: val };
        if (field === "actualReach" && val > 0 && u.status === "Needs results") u.status = "Completed";
        return u;
      });
      saveLS(LS_A, next);
      return next;
    });
  }, []);

  const fp = ownerFilter === "All" ? partners : partners.filter(p => p.owner === ownerFilter);
  const fa = ownerFilter === "All" ? activities    : activities.filter(a => a.owner === ownerFilter);

  return (
    <div style={{ fontFamily:"system-ui,sans-serif", background:"#F8FAFC", height:"100vh", display:"flex", flexDirection:"column", color:"#1E293B" }}>

      {/* ── NAV ── */}
      <div style={{ background:"#fff", borderBottom:"1px solid #E2E8F0", flexShrink:0 }}>
        <div style={{ display:"flex", alignItems:"center", gap:12, padding:"10px 16px", borderBottom:"1px solid #F1F5F9" }}>
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            <div style={{ width:28, height:28, borderRadius:6, background:"linear-gradient(135deg,#1565C0,#42A5F5)", display:"flex", alignItems:"center", justifyContent:"center" }}>
              <span style={{ color:"#fff", fontSize:13, fontWeight:700 }}>TT</span>
            </div>
            <span style={{ fontWeight:700, fontSize:15, color:"#0F172A" }}>TY26 Partner Marketing Calendar</span>
            <span style={{ fontSize:11, color:"#94A3B8", background:"#F1F5F9", borderRadius:4, padding:"2px 7px", fontWeight:500 }}>Tax Season 2026</span>
          </div>
          <div style={{ marginLeft:"auto", display:"flex", gap:6, alignItems:"center" }}>
            <a href="https://docs.google.com/presentation/d/1BT-tzwIUL1LhxC9dOhUWLo-JTqYhGxrsev5Y0QKsn_Q/edit?slide=id.g30769bf70a6_0_0#slide=id.g30769bf70a6_0_0" target="_blank" rel="noopener noreferrer"
              style={{ padding:"6px 12px", borderRadius:6, border:"1px solid #E2E8F0", background:"#FFF7ED", color:"#C2410C", fontWeight:600, fontSize:12, textDecoration:"none", whiteSpace:"nowrap" }}>
              🎨 TY25 Creative
            </a>
            <a href="https://docs.google.com/spreadsheets/d/1GP1w0s1JiRReDAlf2SX6JK5yxIxw2WsxlAo_la3OKAM/edit?gid=788595731#gid=788595731" target="_blank" rel="noopener noreferrer"
              style={{ padding:"6px 12px", borderRadius:6, border:"1px solid #E2E8F0", background:"#F0FDF4", color:"#15803D", fontWeight:600, fontSize:12, textDecoration:"none", whiteSpace:"nowrap" }}>
              📈 Partner Benchmarks
            </a>
            <div style={{ width:1, height:20, background:"#E2E8F0", margin:"0 2px" }} />
            {["calendar","log","gtm"].map(t => (
              <button key={t} onClick={() => setTab(t)} style={{ padding:"6px 16px", borderRadius:6, border:"none", cursor:"pointer", fontWeight:600, fontSize:13, background: tab===t ? "#1565C0" : "transparent", color: tab===t ? "#fff" : "#64748B" }}>
                {t==="calendar" ? "📅 Calendar" : t==="log" ? "📋 Activity Log" : "📊 GTM Pulse"}
              </button>
            ))}
          </div>
        </div>
        <div style={{ display:"flex", gap:2, padding:"7px 16px", alignItems:"center" }}>
          {["All", ...ams].map(o => {
            const c = OWNER_COLORS[o] || "#1565C0", act = ownerFilter === o;
            return (
              <button key={o} onClick={() => setOwner(o)} style={{ padding:"5px 12px", borderRadius:20, border: act ? `2px solid ${c}` : "2px solid transparent", cursor:"pointer", fontWeight:600, fontSize:12, whiteSpace:"nowrap", background: act ? c : "#F8FAFC", color: act ? "#fff" : c }}>
                {o === "All" ? "All AMs" : o.split(" ")[0]}
              </button>
            );
          })}
          <button onClick={() => setAdd(true)} style={{ marginLeft:"auto", padding:"5px 14px", borderRadius:20, border:"none", background:"#1565C0", color:"#fff", fontWeight:600, fontSize:12, cursor:"pointer" }}>+ Add Activity</button>
          <button onClick={() => setPartnerModal("add")} style={{ padding:"5px 14px", borderRadius:20, border:"1px solid #CBD5E1", background:"#F1F5F9", color:"#374151", fontWeight:600, fontSize:12, cursor:"pointer" }}>&#9998; Edit Partners</button>
          <button onClick={() => setAMModal(true)} style={{ padding:"5px 14px", borderRadius:20, border:"1px solid #CBD5E1", background:"#F1F5F9", color:"#374151", fontWeight:600, fontSize:12, cursor:"pointer" }}>&#9998; Edit AMs</button>
        </div>
      </div>

      {/* ── VIEWS ── */}
      {tab === "calendar" && <CalendarView partners={fp} activities={fa} onActivityClick={setModal} scrollRef={calRef} onPartnerClick={p => setPartnerModal(p)} />}
      {tab === "log"      && <ActivityLog  activities={fa} onUpdate={updateAct} onActivityClick={setModal} partners={partners} />}
      {tab === "gtm"      && <GtmPulse owners={ownerFilter==="All" ? ams : [ownerFilter]} gtmData={gtmData} onSave={g => { setGtm(g); saveLS(LS_GTM,g); }} activities={activities} partners={partners} />}

      {/* ── MODALS ── */}
      {modal   && <ActivityModal activity={modal} onClose={() => setModal(null)}
                    onUpdate={(id,f,v) => { updateAct(id,f,v); setModal(p => p ? {...p,[f]:v} : null); }}
                    onDelete={id => { setActs(a => { const n=a.filter(x=>x.id!==id); saveLS(LS_A,n); return n; }); setModal(null); }} />}
      {amModal && <AMModal
        ams={ams}
        onClose={() => setAMModal(false)}
        onSave={updatedAMs => { setAMs(updatedAMs); saveLS(LS_AM, updatedAMs); }}
      />}
      {partnerModal && <PartnerModal
        mode={partnerModal === "add" ? "add" : "edit"}
        partner={partnerModal === "add" ? null : partnerModal}
        onClose={() => setPartnerModal(null)}
        onSave={p => {
          let next;
          if (partnerModal === "add") {
            next = [...partners, { ...p, id: `p-${Date.now()}` }];
          } else {
            next = partners.map(x => x.id === p.id ? p : x);
          }
          setPartners(next); saveLS(LS_P, next); setPartnerModal(null);
        }}
        onDelete={id => {
          const next = partners.filter(x => x.id !== id);
          setPartners(next); saveLS(LS_P, next); setPartnerModal(null);
        }}
        ams={ams}
      />}
      {addModal && <AddActivityModal onClose={() => setAdd(false)} partners={partners}
                    onAdd={act => { const n=[...activities,{...act,id:`act-${Date.now()}`}]; setActs(n); saveLS(LS_A,n); setAdd(false); }} />}
    </div>
  );
}

// ---- CALENDAR VIEW ----
function CalendarView({ partners, activities, onActivityClick, scrollRef, onPartnerClick }) {
  const PCW=170, WCW=130, HRH=52, TRH=44;
  const bottomRef = useRef(null);

  const totalActs      = activities.length;
  const totalPlanned   = activities.reduce((s,a) => s+(a.plannedReach||0), 0);
  const totalActual    = activities.reduce((s,a) => s+(a.actualReach||0), 0);
  const totalLive      = activities.filter(a => a.status==="Live").length;
  const totalCompleted = activities.filter(a => a.status==="Completed").length;
  const totalNR        = activities.filter(a => a.status==="Needs results").length;
  const totalUpcoming  = activities.filter(a => a.status==="Planned").length;

  const weekTotals = WEEKS.map(w => {
    const wa = activities.filter(a => a.startDate === w.end);
    return { actualReach: wa.reduce((s,a)=>s+(a.actualReach||0),0), live: wa.filter(a=>a.status==="Live").length, nr: wa.filter(a=>a.status==="Needs results").length };
  });

  const curIdx = WEEKS.findIndex(w => w.end === CURRENT_WEEK);
  useEffect(() => {
    if (scrollRef.current && curIdx >= 0) {
      setTimeout(() => {
        const sl = Math.max(0,(curIdx-2)*WCW);
        if (scrollRef.current)  scrollRef.current.scrollLeft  = sl;
        if (bottomRef.current)  bottomRef.current.scrollLeft  = sl;
      }, 150);
    }
  }, []);

  const onScroll = e => { if (bottomRef.current) bottomRef.current.scrollLeft = e.target.scrollLeft; };

  const Stat = ({label,value,bg,color,border}) => (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", background:bg, border:`1px solid ${border}`, borderRadius:8, padding:"6px 10px", minWidth:60 }}>
      <span style={{ fontSize:15, fontWeight:800, color, lineHeight:1 }}>{value}</span>
      <span style={{ fontSize:8, color, opacity:.75, marginTop:2, textTransform:"uppercase", letterSpacing:"0.04em", fontWeight:600, whiteSpace:"nowrap" }}>{label}</span>
    </div>
  );

  return (
    <div style={{ display:"flex", flexDirection:"column", flex:1, overflow:"hidden" }}>

      {/* season banner */}
      <div style={{ background:"linear-gradient(135deg,#0F172A,#1E3A5F)", borderBottom:"3px solid #1565C0", padding:"10px 16px", display:"flex", alignItems:"center", gap:8, flexShrink:0, flexWrap:"wrap" }}>
        <div style={{ marginRight:8 }}>
          <div style={{ fontSize:10, fontWeight:700, color:"#94A3B8", textTransform:"uppercase", letterSpacing:"0.06em" }}>Season Totals</div>
          <div style={{ fontSize:8, color:"#64748B", marginTop:1 }}>{partners.length} partners · all weeks</div>
        </div>
        <Stat label="Activities"        value={totalActs}                          bg="#1E293B" color="#E2E8F0" border="#334155" />
        <Stat label="Planned Reach"     value={fmt(totalPlanned)}                  bg="#1E3A5F" color="#93C5FD" border="#1D4ED8" />
        <Stat label="Actual Reach" value={totalActual>0?fmt(totalActual):"\u2014"} bg="#064E3B" color="#6EE7B7" border="#065F46" />
        <div style={{ width:1, height:38, background:"#334155", margin:"0 2px" }} />
        <Stat label="Live"         value={totalLive}      bg="#1E3A5F" color="#60A5FA" border="#3B82F6" />
        <Stat label="Completed"    value={totalCompleted} bg="#064E3B" color="#34D399" border="#10B981" />
        {totalNR>0 && <Stat label="Needs Results" value={totalNR} bg="#450A0A" color="#FCA5A5" border="#EF4444" />}
        <Stat label="Upcoming" value={totalUpcoming} bg="#1C1917" color="#D6D3D1" border="#44403C" />
        <div style={{ marginLeft:"auto", minWidth:110 }}>
          <div style={{ fontSize:8, color:"#94A3B8", textTransform:"uppercase", letterSpacing:"0.05em", marginBottom:3, fontWeight:600 }}>Season Progress</div>
          <div style={{ background:"#1E293B", borderRadius:4, height:7, overflow:"hidden" }}>
            <div style={{ width:`${totalActs?Math.round((totalCompleted/totalActs)*100):0}%`, background:"linear-gradient(90deg,#1565C0,#34D399)", height:"100%", borderRadius:4 }} />
          </div>
          <div style={{ fontSize:8, color:"#64748B", marginTop:2 }}>{totalActs?Math.round((totalCompleted/totalActs)*100):0}% complete</div>
        </div>
      </div>

      {/* main grid + bottom totals */}
      <div style={{ display:"flex", flexDirection:"column", flex:1, overflow:"hidden" }}>

        {/* grid row */}
        <div style={{ display:"flex", flex:1, overflow:"hidden" }}>

          {/* frozen left column */}
          <div style={{ width:PCW, flexShrink:0, background:"#fff", borderRight:"2px solid #E2E8F0", zIndex:10, display:"flex", flexDirection:"column" }}>
            <div style={{ height:HRH, borderBottom:"1px solid #E2E8F0", padding:"0 12px", display:"flex", alignItems:"flex-end", paddingBottom:8, background:"#F8FAFC" }}>
              <span style={{ fontWeight:700, fontSize:10, color:"#94A3B8", textTransform:"uppercase", letterSpacing:"0.05em" }}>Partner</span>
            </div>
            <div style={{ overflowY:"auto", flex:1 }}>
              {partners.map(p => {
                const color = OWNER_COLORS[p.owner] || "#64748B";
                return (
                  <div key={p.id} style={{ padding:"7px 10px", borderBottom:"1px solid #F1F5F9", display:"flex", alignItems:"center", gap:5, height:52, boxSizing:"border-box" }}>
                    <div style={{ width:3, height:26, borderRadius:2, background:color, flexShrink:0 }} />
                    <div style={{ minWidth:0 }}>
                      <div onClick={() => onPartnerClick && onPartnerClick(p)} style={{ fontSize:11, fontWeight:600, color:"#1E293B", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", cursor:"pointer", textDecoration:"underline dotted" }} title="Click to edit partner">{p.name}</div>
                      <div style={{ fontSize:9, color:"#94A3B8", display:"flex", gap:3 }}>
                        <span style={{ background:"#F1F5F9", borderRadius:3, padding:"1px 3px" }}>{p.type}</span>
                        {p.status==="New" && <span style={{ background:"#D1FAE5", color:"#065F46", borderRadius:3, padding:"1px 3px" }}>New</span>}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* scrollable week columns */}
          <div ref={scrollRef} onScroll={onScroll} style={{ flex:1, overflowX:"auto", overflowY:"hidden", display:"flex", flexDirection:"column" }}>
            <div style={{ width:WEEKS.length*WCW, display:"flex", flexDirection:"column", height:"100%" }}>

              {/* week headers */}
              <div style={{ display:"flex", borderBottom:"1px solid #E2E8F0", height:HRH, flexShrink:0 }}>
                {WEEKS.map(w => {
                  const isCur = w.end===CURRENT_WEEK, kb = KEY_DATE_BADGES[w.end];
                  return (
                    <div key={w.end} style={{ width:WCW, flexShrink:0, padding:"6px 8px 4px", background:isCur?"#EFF6FF":"#fff", borderRight:"1px solid #F1F5F9", borderBottom:isCur?"2px solid #3B82F6":undefined, boxSizing:"border-box" }}>
                      <div style={{ fontWeight:700, fontSize:11, color:isCur?"#1D4ED8":"#374151" }}>
                        {w.label}{isCur && <span style={{ marginLeft:4, fontSize:8, background:"#3B82F6", color:"#fff", borderRadius:3, padding:"1px 4px" }}>NOW</span>}
                      </div>
                      <div style={{ fontSize:9, color:"#94A3B8" }}>{w.range}</div>
                      {kb && <div style={{ fontSize:8, background:"#FEF3C7", color:"#92400E", borderRadius:3, padding:"1px 3px", marginTop:1, display:"inline-block" }}>{kb}</div>}
                    </div>
                  );
                })}
              </div>

              {/* partner rows */}
              <div style={{ flex:1, overflowY:"auto" }}>
                {partners.map(p => {
                  const pas = activities.filter(a => a.partner===p.name);
                  return (
                    <div key={p.id} style={{ display:"flex", borderBottom:"1px solid #F1F5F9", height:58 }}>
                      {WEEKS.map(w => {
                        const isCur = w.end===CURRENT_WEEK;
                        const wa = pas.filter(a => a.startDate===w.end);
                        return (
                          <div key={w.end} style={{ width:WCW, flexShrink:0, padding:"3px 5px", borderRight:"1px solid #F1F5F9", background:isCur?"#EFF6FF":undefined, display:"flex", flexDirection:"column", gap:1, overflow:"hidden" }}>
                            {wa.map(a => {
                              const sc = STATUS_COLORS[a.status] || STATUS_COLORS.Planned;
                              return (
                                <div key={a.id} onClick={() => onActivityClick(a)}
                                  style={{ background:sc.bg, borderLeft:`3px solid ${sc.border}`, borderRadius:"0 3px 3px 0", padding:"1px 4px", fontSize:11, fontWeight:600, color:"#000000", cursor:"pointer", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}
                                  title={a.description}>
                                  {a.activityType!=="Other" ? a.activityType.split("/")[0] : ""} {a.description.slice(0,24)}{a.description.length>24?"\u2026":""}
                                </div>
                              );
                            })}
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </div>

            </div>
          </div>
        </div>

        {/* bottom totals row */}
        <div style={{ display:"flex", flexShrink:0, borderTop:"2px solid #CBD5E1", background:"#F1F5F9", height:TRH }}>
          <div style={{ width:PCW, flexShrink:0, background:"#F1F5F9", borderRight:"2px solid #E2E8F0", display:"flex", alignItems:"center", padding:"0 12px" }}>
            <span style={{ fontWeight:700, fontSize:10, color:"#64748B", textTransform:"uppercase", letterSpacing:"0.04em" }}>Actual Reach</span>
          </div>
          <div ref={bottomRef} style={{ flex:1, overflowX:"hidden" }}>
            <div style={{ display:"flex", width:WEEKS.length*WCW }}>
              {WEEKS.map((w,i) => {
                const t = weekTotals[i], isCur = w.end===CURRENT_WEEK;
                return (
                  <div key={w.end} style={{ width:WCW, flexShrink:0, padding:"5px 7px", borderRight:"1px solid #E2E8F0", background:isCur?"#DBEAFE":undefined, display:"flex", flexDirection:"column", justifyContent:"center", gap:2, boxSizing:"border-box", height:TRH }}>
                    {(t.actualReach===0 && t.live===0 && t.nr===0)
                      ? <span style={{ fontSize:9, color:"#CBD5E1" }}>\u2014</span>
                      : <>
                          {t.actualReach>0 && <span style={{ fontSize:11, color:"#059669", fontWeight:800, letterSpacing:"-0.02em" }}>{fmt(t.actualReach)}</span>}
                          <div style={{ display:"flex", gap:2 }}>
                            {t.live>0 && <span style={{ fontSize:9, background:"#BFDBFE", color:"#1D4ED8", borderRadius:3, padding:"1px 4px", fontWeight:700 }}>{t.live} live</span>}
                            {t.nr>0   && <span style={{ fontSize:9, background:"#FEE2E2", color:"#991B1B", borderRadius:3, padding:"1px 4px", fontWeight:700 }}>\u26a0{t.nr}</span>}
                          </div>
                        </>
                    }
                  </div>
                );
              })}
            </div>
          </div>
        </div>

      </div>
    </div>
  );
}

// ---- ACTIVITY LOG ----
function ActivityLog({ activities, onUpdate, onActivityClick }) {
  const [search, setSearch]   = useState("");
  const [statusF, setStatusF] = useState("All");
  const filtered = activities
    .filter(a => (!search || (a.partner+a.description).toLowerCase().includes(search.toLowerCase())) && (statusF==="All" || a.status===statusF))
    .sort((a,b) => b.startDate.localeCompare(a.startDate));
  return (
    <div style={{ padding:16, flex:1, overflow:"auto" }}>
      <div style={{ display:"flex", gap:10, marginBottom:14, alignItems:"center" }}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search partner or description\u2026"
          style={{ padding:"7px 12px", borderRadius:8, border:"1px solid #E2E8F0", fontSize:13, width:280, outline:"none" }} />
        <select value={statusF} onChange={e=>setStatusF(e.target.value)} style={{ padding:"7px 12px", borderRadius:8, border:"1px solid #E2E8F0", fontSize:13, outline:"none" }}>
          <option value="All">All statuses</option>{STATUSES.map(s=><option key={s}>{s}</option>)}
        </select>
        <span style={{ marginLeft:"auto", fontSize:12, color:"#64748B" }}>{filtered.length} activities</span>
      </div>

// ---- AM MODAL ----
function AMModal({ ams, onClose, onSave }) {
  const [list, setList] = useState([...ams]);
  const [newName, setNewName] = useState("");
  const [editIdx, setEditIdx] = useState(null);
  const [editVal, setEditVal] = useState("");

  const addAM = () => {
    const trimmed = newName.trim();
    if (!trimmed || list.includes(trimmed)) return;
    setList([...list, trimmed]);
    setNewName("");
  };

  const deleteAM = idx => {
    if (!confirm(`Remove ${list[idx]}? They will no longer appear as an AM tab.`)) return;
    const next = list.filter((_,i) => i !== idx);
    setList(next);
  };

  const startEdit = (idx) => { setEditIdx(idx); setEditVal(list[idx]); };
  const saveEdit = () => {
    const trimmed = editVal.trim();
    if (!trimmed) return;
    const next = list.map((am, i) => i === editIdx ? trimmed : am);
    setList(next);
    setEditIdx(null);
    setEditVal("");
  };

  return (
    <div onClick={onClose} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.4)", zIndex:1000, display:"flex", alignItems:"center", justifyContent:"center", padding:24 }}>
      <div onClick={e => e.stopPropagation()} style={{ background:"#fff", borderRadius:16, width:"100%", maxWidth:460, boxShadow:"0 20px 60px rgba(0,0,0,0.2)", overflow:"hidden" }}>
        <div style={{ padding:"16px 20px", borderBottom:"1px solid #E2E8F0", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <span style={{ fontWeight:700, fontSize:16 }}>Manage Account Managers</span>
          <button onClick={onClose} style={{ border:"none", background:"none", fontSize:20, cursor:"pointer", color:"#94A3B8" }}>×</button>
        </div>

        {/* AM list */}
        <div style={{ padding:"12px 20px", maxHeight:320, overflowY:"auto" }}>
          {list.map((am, idx) => {
            const color = OWNER_COLORS[am] || "#64748B";
            return (
              <div key={idx} style={{ display:"flex", alignItems:"center", gap:8, padding:"8px 0", borderBottom:"1px solid #F1F5F9" }}>
                <div style={{ width:3, height:28, borderRadius:2, background:color, flexShrink:0 }} />
                {editIdx === idx ? (
                  <>
                    <input value={editVal} onChange={e => setEditVal(e.target.value)}
                      onKeyDown={e => { if(e.key==="Enter") saveEdit(); if(e.key==="Escape") setEditIdx(null); }}
                      style={{ flex:1, padding:"5px 9px", borderRadius:7, border:"1px solid #93C5FD", fontSize:13, outline:"none", background:"#EFF6FF" }}
                      autoFocus />
                    <button onClick={saveEdit} style={{ padding:"5px 12px", borderRadius:7, border:"none", background:"#1565C0", color:"#fff", fontWeight:600, fontSize:12, cursor:"pointer" }}>Save</button>
                    <button onClick={() => setEditIdx(null)} style={{ padding:"5px 10px", borderRadius:7, border:"1px solid #E2E8F0", background:"#F8FAFC", fontWeight:600, fontSize:12, cursor:"pointer" }}>Cancel</button>
                  </>
                ) : (
                  <>
                    <span style={{ flex:1, fontSize:13, fontWeight:600, color:"#1E293B" }}>{am}</span>
                    <button onClick={() => startEdit(idx)} style={{ padding:"4px 10px", borderRadius:6, border:"1px solid #E2E8F0", background:"#F8FAFC", fontSize:11, fontWeight:600, cursor:"pointer", color:"#374151" }}>Edit</button>
                    <button onClick={() => deleteAM(idx)} style={{ padding:"4px 10px", borderRadius:6, border:"1px solid #FECACA", background:"#FEF2F2", fontSize:11, fontWeight:600, cursor:"pointer", color:"#DC2626" }}>Delete</button>
                  </>
                )}
              </div>
            );
          })}
        </div>

        {/* Add new AM */}
        <div style={{ padding:"12px 20px", borderTop:"1px solid #E2E8F0", display:"flex", gap:8 }}>
          <input value={newName} onChange={e => setNewName(e.target.value)}
            onKeyDown={e => { if(e.key==="Enter") addAM(); }}
            placeholder="New AM full name…"
            style={{ flex:1, padding:"8px 10px", borderRadius:8, border:"1px solid #E2E8F0", fontSize:13, outline:"none" }} />
          <button onClick={addAM} disabled={!newName.trim()}
            style={{ padding:"8px 16px", borderRadius:8, border:"none", background: newName.trim() ? "#1565C0" : "#CBD5E1", color:"#fff", fontWeight:700, fontSize:13, cursor: newName.trim() ? "pointer" : "not-allowed" }}>
            + Add
          </button>
        </div>

        {/* Footer */}
        <div style={{ padding:"12px 20px", borderTop:"1px solid #E2E8F0", display:"flex", justifyContent:"flex-end", gap:8 }}>
          <button onClick={onClose} style={{ padding:"8px 16px", borderRadius:8, border:"1px solid #E2E8F0", background:"#F8FAFC", fontWeight:600, fontSize:13, cursor:"pointer" }}>Cancel</button>
          <button onClick={() => { onSave(list); onClose(); }}
            style={{ padding:"8px 20px", borderRadius:8, border:"none", background:"#1565C0", color:"#fff", fontWeight:700, fontSize:13, cursor:"pointer" }}>
            Save Changes
          </button>
        </div>
      </div>
    </div>
  );
}

              <label style={LS}>Partner Type</label>
              <select value={form.type} onChange={e => set("type", e.target.value)} style={IS}>
                {["Cash Back","Investor","General","W-2","SE","Crypto"].map(t => <option key={t}>{t}</option>)}
              </select>
            </div>
            <div>
              <label style={LS}>Status</label>
              <select value={form.status} onChange={e => set("status", e.target.value)} style={IS}>
                <option>Returning</option>
                <option>New</option>
              </select>
            </div>
          </div>
        </div>
        <div style={{ padding:"12px 20px", borderTop:"1px solid #E2E8F0", display:"flex", justifyContent:"space-between" }}>
          <div>
            {isEdit && (
              <button onClick={() => { if (confirm(`Delete ${form.name}? This won't remove their activities.`)) onDelete(form.id); }}
                style={{ padding:"8px 16px", borderRadius:8, border:"1px solid #FECACA", background:"#FEF2F2", color:"#DC2626", fontWeight:600, fontSize:13, cursor:"pointer" }}>
                Delete
              </button>
            )}
          </div>
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={onClose} style={{ padding:"8px 16px", borderRadius:8, border:"1px solid #E2E8F0", background:"#F8FAFC", fontWeight:600, fontSize:13, cursor:"pointer" }}>Cancel</button>
            <button onClick={() => valid && onSave(form)} disabled={!valid}
              style={{ padding:"8px 20px", borderRadius:8, border:"none", background: valid ? "#1565C0" : "#CBD5E1", color:"#fff", fontWeight:700, fontSize:13, cursor: valid ? "pointer" : "not-allowed" }}>
              {isEdit ? "Save Changes" : "Add Partner"}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
